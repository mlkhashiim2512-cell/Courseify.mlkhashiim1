    <main>
        <section class="add">
            <div class="boxn">
            <h2>• Register New Course</h2>
            </div>
            <div class=" text-form"> 
            
            
            <form action="#">
                <div class="inputt">
                    <label>Course Name</label>
                    <input type="text" placeholder=" Enter Course Name" required>
                </div>
                <div class="inputt">
                    <label>Instructor</label>
                    <input type="text" placeholder="Instructor Name" required>
                </div>
                <div class="inputt">
                    <label>Credit Hours</label>
                    <select required>
                    <option value="20">20 Hours</option>
                    <option value="15">15 Hours</option>
                    <option value="30">30 Hours</option>
                    </select>
                </div>
                <div class="inputt">
                    <label>Notes</label>
                    <textarea placeholder="Write your notes here..."></textarea>
                </div>
                <button type="submit" class="saveb"> Save Course</button>
            </form>
            </div>
        </section>
    
    </main>
